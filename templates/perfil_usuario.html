{% extends "base.html" %}

{% block content %}
<section class="page-head">
    <div>
        <p class="section-tag">Configurações</p>
        <h2>Minha conta</h2>
    </div>
</section>

<section class="card">
    <h3>Dados básicos</h3>
    <form method="post" class="form-grid two-cols">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="action" value="dados">
        <label class="full-span">
            Nome completo
            <input type="text" name="nome" maxlength="80" pattern="[A-Za-zÀ-ÿ' -]{3,80}" value="{{ usuario.nome }}" required>
        </label>
        <label class="full-span">
            Nome do GA
            <input type="text" name="lider_ga" maxlength="80" pattern="[A-Za-zÀ-ÿ' -]{3,80}" value="{{ usuario.lider_ga or '' }}" required>
        </label>
        <div class="form-actions">
            <button type="submit">Salvar dados</button>
        </div>
    </form>
</section>

<section class="card">
    <h3>Alterar senha</h3>
    <form method="post" class="form-grid">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="action" value="senha">
        <label>
            Nova senha
            <input type="password" name="nova_senha" minlength="12" maxlength="128" required>
            <small class="field-help">Mínimo 12 caracteres com letra maiúscula, minúscula, número e símbolo.</small>
        </label>
        <div class="form-actions">
            <button type="submit">Salvar senha</button>
        </div>
    </form>
</section>
{% endblock %}
