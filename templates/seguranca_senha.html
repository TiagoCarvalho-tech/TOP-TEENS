{% extends "base.html" %}

{% block content %}
<section class="page-head">
    <div>
        <p class="section-tag">Segurança</p>
        <h2>Alterar senha do acesso</h2>
        <p class="muted">Use uma senha longa e exclusiva para o ambiente real.</p>
        <p class="muted">Regra da senha: no mínimo 12 caracteres, com pelo menos 1 letra maiúscula, 1 letra minúscula, 1 número e 1 caractere especial.</p>
    </div>
</section>

<section class="card">
    <form method="post" class="form-grid">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <label>
            Senha atual
            <input type="password" name="senha_atual" autocomplete="current-password" required>
        </label>
        <label>
            Nova senha
            <input type="password" name="nova_senha" autocomplete="new-password" minlength="12" maxlength="128" required>
            <small class="field-help">Exemplo de formato forte: `NovaTeens@2026`.</small>
        </label>
        <label>
            Confirmar nova senha
            <input type="password" name="confirmar_senha" autocomplete="new-password" minlength="12" maxlength="128" required>
        </label>
        <div class="form-actions">
            <button type="submit">Salvar nova senha</button>
        </div>
    </form>
</section>
{% endblock %}
