{% extends "base.html" %}

{% block content %}
<section class="page-head">
    <div>
        <p class="section-tag">Meu GA</p>
        <h2>{% if adolescente %}Editar adolescente{% else %}Novo adolescente{% endif %}</h2>
    </div>
</section>

<section class="card">
    <form method="post" enctype="multipart/form-data" class="form-grid two-cols" data-foto-upload-form data-max-upload-mb="{{ max_upload_mb }}">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <label class="full-span">
            Foto do adolescente {% if not adolescente %}*{% endif %}
            <input type="file" name="foto" accept=".jpg,.jpeg,.png" {% if not adolescente %}required{% endif %} data-foto-input>
            <small class="field-help">Formatos aceitos: JPG, JPEG ou PNG. Máximo: {{ max_upload_mb }}MB.</small>
            <small class="field-help upload-feedback" data-upload-feedback aria-live="polite"></small>
            <div class="upload-preview" data-upload-preview>
                <img data-upload-preview-image src="" alt="Prévia da foto selecionada" hidden>
                <small class="field-help" data-upload-preview-placeholder>Pré-visualização da foto aparecerá aqui.</small>
            </div>
        </label>
        <label class="full-span">
            Nome completo
            <input type="text" name="nome" maxlength="80" pattern="[A-Za-zÀ-ÿ' -]{3,80}" value="{{ adolescente.nome if adolescente else '' }}" required>
        </label>
        <label>
            Data de aniversário
            <input type="date" name="nascimento" min="1950-01-01" max="{{ today }}" value="{{ adolescente.nascimento if adolescente else '' }}" required>
        </label>
        <label>
            Gênero
            <select name="sexo" required>
                {% set sexo = adolescente.sexo if adolescente else '' %}
                <option value="">Selecione</option>
                <option value="F" {% if sexo == 'F' %}selected{% endif %}>Feminino</option>
                <option value="M" {% if sexo == 'M' %}selected{% endif %}>Masculino</option>
            </select>
        </label>
        <label class="full-span">
            Nome do responsável
            <input
                type="text"
                name="responsavel"
                maxlength="80"
                pattern="[A-Za-zÀ-ÿ' -]{3,80}"
                value="{{ adolescente.pai if adolescente and adolescente.pai else (adolescente.mae if adolescente and adolescente.mae else '') }}"
                required
            >
        </label>
        <label class="full-span">
            Contato do responsável
            <input type="tel" name="contato" maxlength="15" placeholder="(92) 99999-9999" value="{{ adolescente.contato if adolescente else '' }}" required>
        </label>
        <div class="form-actions">
            <button type="submit">{% if adolescente %}Salvar alterações{% else %}Cadastrar adolescente{% endif %}</button>
        </div>
    </form>
</section>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='upload-foto.js', v=today) }}"></script>
{% endblock %}
