{% extends "base.html" %}

{% block content %}
<section class="auth-shell single">
    <article class="auth-card wide">
        <div class="auth-head">
            <div>
                <h2>Criar conta de líder</h2>
                <p class="muted">Cadastro simples para entrar no sistema.</p>
            </div>
            <a class="button-link alt" href="{{ url_for('login') }}">Voltar ao login</a>
        </div>

        <form method="post" class="form-grid two-cols">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <label class="full-span">
                Nome completo
                <input type="text" name="nome" maxlength="80" pattern="[A-Za-zÀ-ÿ' -]{3,80}" required>
            </label>
            <label>
                Data de aniversário
                <input type="date" name="aniversario" min="1950-01-01" max="{{ today }}" required>
            </label>
            <label>
                Nome do GA
                <input type="text" name="lider_ga" maxlength="80" pattern="[A-Za-zÀ-ÿ' -]{3,80}" required>
            </label>
            <label class="full-span">
                Senha
                <input type="password" name="senha" minlength="12" maxlength="128" required>
                <small class="field-help">Use pelo menos 12 caracteres com letra maiúscula, minúscula, número e símbolo.</small>
            </label>
            <div class="form-actions">
                <button type="submit">Criar cadastro</button>
            </div>
        </form>
    </article>
</section>
{% endblock %}
